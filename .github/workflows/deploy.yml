name: "🚀 Optimización y Despliegue Élite"

on:
  push:
    branches: ["main"] # Se activa cada vez que subes cambios a main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🧹 Minificar HTML, CSS y JS
        run: |
          # Instalamos herramientas de optimización profesionales
          npm install -g html-minifier-terser clean-css-cli uglify-js
          
          # Minificar el HTML
          html-minifier-terser --collapse-whitespace --remove-comments --minify-css true --minify-js true -o index.html index.html
          
          # Nota: Si tuvieras archivos .css o .js externos, los minificaríamos aquí.

      - name: 🚀 Desplegar a GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # Despliega la raíz optimizada
          branch: gh-pages # Crea una rama especial para los archivos de producción
          clean: true
