<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    
    <title>JJMex Community | Hub Oficial</title>
    <meta name="description" content="Red de inteligencia vial y movilidad de élite.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --bg-dark: #050505;
            --glass-bg: rgba(15, 15, 15, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #888;
            --tg-color: #229ED9;
            --wa-color: #25D366;
            --accent: #3b82f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- BACKGROUND --- */
        .ambient-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050505 100%);
        }

        /* --- HEADER MINIMALISTA (ELIMINADO EL BANNER) --- */
        header {
            text-align: center; padding: 80px 20px 40px; width: 100%; max-width: 600px;
            animation: fadeIn 1s ease-out;
        }
        .logo-placeholder {
            width: 80px; height: 80px; background: linear-gradient(135deg, #222, #000);
            border: 1px solid var(--glass-border); border-radius: 22px; margin: 0 auto 20px;
            display: grid; place-items: center; font-size: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.04em; margin-bottom: 8px; }
        .verified { color: var(--accent); vertical-align: middle; width: 22px; }
        .subtitle { color: var(--text-muted); font-size: 1rem; font-weight: 300; max-width: 300px; margin: 0 auto; }

        /* --- CONTENEDOR --- */
        .container { width: 100%; max-width: 500px; padding: 20px; display: flex; flex-direction: column; gap: 14px; }

        .section-label {
            font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em;
            color: #444; margin: 25px 0 5px 5px; display: flex; align-items: center; gap: 10px;
        }
        .section-label::after { content: ''; height: 1px; flex-grow: 1; background: linear-gradient(90deg, #222, transparent); }

        /* --- TARJETAS DINÁMICAS (ILUMINACIÓN) --- */
        .card {
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 18px; display: flex; align-items: center; gap: 16px;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: pointer;
            backdrop-filter: blur(12px); position: relative;
        }

        /* Efectos Hover por Plataforma */
        .card-tg:hover { 
            border-color: var(--tg-color); 
            box-shadow: 0 0 25px rgba(34, 158, 217, 0.15);
            background: rgba(34, 158, 217, 0.05);
        }
        .card-wa:hover { 
            border-color: var(--wa-color); 
            box-shadow: 0 0 25px rgba(37, 211, 102, 0.15);
            background: rgba(37, 211, 102, 0.05);
        }

        .icon-box {
            width: 48px; height: 48px; border-radius: 14px; background: #111;
            display: grid; place-items: center; border: 1px solid var(--glass-border);
            transition: 0.4s ease; color: #555;
        }
        
        /* Iluminación de Icono en Hover */
        .card-tg:hover .icon-box { color: var(--tg-color); border-color: var(--tg-color); transform: scale(1.05); }
        .card-wa:hover .icon-box { color: var(--wa-color); border-color: var(--wa-color); transform: scale(1.05); }

        .content h3 { font-size: 1rem; font-weight: 600; margin-bottom: 2px; }
        .content p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.3; }

        .qr-btn {
            margin-left: auto; background: none; border: none; color: #333;
            padding: 8px; cursor: pointer; transition: 0.3s;
        }
        .qr-btn:hover { color: #fff; transform: rotate(90deg); }

        /* --- MODAL --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            display: grid; place-items: center; opacity: 0; pointer-events: none; transition: 0.4s; z-index: 1000;
        }
        .modal.active { opacity: 1; pointer-events: all; }
        .qr-window { text-align: center; transform: translateY(20px); transition: 0.4s; }
        .modal.active .qr-window { transform: translateY(0); }
        #qrcode { background: #fff; padding: 15px; border-radius: 18px; margin: 20px auto; }
        .close-btn { 
            background: #222; color: #fff; border: 1px solid #333; padding: 10px 30px; 
            border-radius: 50px; cursor: pointer; font-family: inherit;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>

    <header>
        <div class="logo-placeholder">🇲🇽</div>
        <h1>JJMex Community <svg class="verified" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></h1>
        <p class="subtitle">Inteligencia vial y redes de movilidad avanzada.</p>
    </header>

    <div class="container" id="hub-container">
        </div>

    <div class="modal" id="qrModal" onclick="closeQR()">
        <div class="qr-window" onclick="event.stopPropagation()">
            <h2 id="qrName">Acceso</h2>
            <div id="qrcode"></div>
            <button class="close-btn" onclick="closeQR()">Cerrar</button>
        </div>
    </div>

    <script>
        const svgs = {
            telegram: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>`,
            whatsapp: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5Z"/></svg>`,
            mindset: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l-2 6H8L6 3Z"/><path d="M10 12h4"/><path d="M12 12v8"/><path d="M9 20h6"/></svg>`
        };

        async function loadHub() {
            const container = document.getElementById('hub-container');
            try {
                // Fetch con cache-busting para evitar que el navegador guarde la versión vieja
                const response = await fetch(`./links.json?v=${Date.now()}`);
                const data = await response.json();
                
                const categorias = [...new Set(data.comunidades.map(c => c.categoria))];
                container.innerHTML = '';

                categorias.forEach(cat => {
                    container.innerHTML += `<div class="section-label">${cat}</div>`;
                    data.comunidades.filter(c => c.categoria === cat).forEach(item => {
                        container.innerHTML += createCard(item);
                    });
                });
            } catch (err) {
                container.innerHTML = `<p style="color:red; text-align:center;">Error al conectar con la base de datos de JJMex.</p>`;
            }
        }

        function createCard(item) {
            const typeClass = item.plataforma === 'telegram' ? 'card-tg' : 'card-wa';
            const icon = item.titulo.toLowerCase().includes('mente') ? svgs.mindset : svgs[item.plataforma];
            
            return `
                <div class="card ${typeClass}" onclick="window.open('${item.url}', '_blank')">
                    <div class="icon-box">${icon}</div>
                    <div class="content">
                        <h3>${item.titulo}</h3>
                        <p>${item.descripcion}</p>
                    </div>
                    <button class="qr-btn" onclick="event.stopPropagation(); showQR('${item.url}', '${item.titulo}')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><path d="M3 14h7v7H3z"></path></svg>
                    </button>
                </div>
            `;
        }

        function showQR(url, title) {
            const modal = document.getElementById('qrModal');
            const qrDiv = document.getElementById('qrcode');
            document.getElementById('qrName').innerText = title;
            qrDiv.innerHTML = '';
            new QRCode(qrDiv, { text: url, width: 180, height: 180, colorDark: "#000", colorLight: "#fff" });
            modal.classList.add('active');
        }

        function closeQR() { document.getElementById('qrModal').classList.remove('active'); }

        document.addEventListener('DOMContentLoaded', loadHub);
    </script>
</body>
</html>
