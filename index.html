<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#050505"><title>JJMex Community | Hub Oficial</title><meta name="description" content="Red de inteligencia vial y movilidad de élite."><link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'/></svg>"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script><style>:root{--bg-dark:#050505;--glass-bg:rgba(15, 15, 15, 0.6);--glass-border:rgba(255, 255, 255, 0.08);--text-main:#ffffff;--text-muted:#888;--tg-color:#229ED9;--wa-color:#25D366;--accent:#3b82f6}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{font-family:Outfit,sans-serif;background-color:var(--bg-dark);color:var(--text-main);display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow-x:hidden}.ambient-bg{position:fixed;inset:0;z-index:-1;background:radial-gradient(circle at 50% -20%,#1a1a1a 0,#050505 100%)}header{text-align:center;padding:70px 20px 30px;width:100%;max-width:600px;animation:fadeIn 1s ease-out}.logo-placeholder{width:70px;height:70px;background:linear-gradient(135deg,#222,#000);border:1px solid var(--glass-border);border-radius:20px;margin:0 auto 15px;display:grid;place-items:center;box-shadow:0 15px 30px rgba(0,0,0,.5)}h1{font-size:2rem;font-weight:700;letter-spacing:-.04em;margin-bottom:5px}.verified{color:var(--accent);vertical-align:middle;width:20px}.subtitle{color:var(--text-muted);font-size:.95rem;font-weight:300}.search-container{width:100%;max-width:500px;padding:0 20px;margin-bottom:10px;position:relative;z-index:10}.search-box{width:100%;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:16px;padding:14px 20px;color:#fff;font-family:inherit;font-size:1rem;outline:0;transition:.3s;backdrop-filter:blur(10px)}.search-box:focus{border-color:#555;box-shadow:0 0 20px rgba(255,255,255,.05)}.search-box::placeholder{color:#666}.shortcut-badge{position:absolute;right:35px;top:50%;transform:translateY(-50%);background:#222;color:#888;font-size:.7rem;padding:4px 8px;border-radius:6px;border:1px solid #333;pointer-events:none;letter-spacing:1px}.container{width:100%;max-width:500px;padding:0 20px 40px;display:flex;flex-direction:column;gap:14px}.category-group{display:flex;flex-direction:column;gap:14px;animation:fadeIn .5s}.section-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:#555;margin:15px 0 0 5px;display:flex;align-items:center;gap:10px}.section-label::after{content:'';height:1px;flex-grow:1;background:linear-gradient(90deg,#222,transparent)}.card{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:20px;padding:16px;display:flex;align-items:center;gap:16px;cursor:pointer;backdrop-filter:blur(12px);transform-style:preserve-3d;position:relative;overflow:hidden}.card::before{content:'';position:absolute;inset:0;background:inherit;z-index:-1;transition:.4s}.card-tg:hover{border-color:rgba(34,158,217,.4);box-shadow:0 10px 30px rgba(34,158,217,.1)}.card-wa:hover{border-color:rgba(37,211,102,.4);box-shadow:0 10px 30px rgba(37,211,102,.1)}.actions,.content,.icon-box{transform:translateZ(30px)}.icon-box{width:48px;height:48px;border-radius:14px;background:#111;display:grid;place-items:center;border:1px solid var(--glass-border);transition:.4s ease;color:#555;flex-shrink:0}.card-tg:hover .icon-box{color:var(--tg-color);border-color:var(--tg-color)}.card-wa:hover .icon-box{color:var(--wa-color);border-color:var(--wa-color)}.content{flex-grow:1;pointer-events:none}.content h3{font-size:1rem;font-weight:600;margin-bottom:2px}.content p{font-size:.85rem;color:var(--text-muted);line-height:1.3}.actions{display:flex;gap:4px}.action-btn{background:rgba(255,255,255,.03);border:1px solid transparent;color:#666;width:38px;height:38px;border-radius:10px;display:grid;place-items:center;cursor:pointer;transition:.3s}.action-btn:hover{background:rgba(255,255,255,.1);color:#fff;transform:scale(1.1)}.modal{position:fixed;inset:0;background:rgba(0,0,0,.95);backdrop-filter:blur(20px);display:grid;place-items:center;opacity:0;pointer-events:none;transition:.4s;z-index:1000}.modal.active{opacity:1;pointer-events:all}.qr-window{text-align:center;transform:translateY(20px);transition:.4s}.modal.active .qr-window{transform:translateY(0)}#qrcode{background:#fff;padding:15px;border-radius:18px;margin:20px auto}.close-btn{background:#222;color:#fff;border:1px solid #333;padding:10px 30px;border-radius:50px;cursor:pointer}#toast{position:fixed;bottom:-50px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 20px;border-radius:50px;font-size:.9rem;font-weight:600;transition:.4s;opacity:0;z-index:2000}#toast.show{bottom:30px;opacity:1}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}@media (max-width:600px){.shortcut-badge{display:none}}</style></head><body><div class="ambient-bg"></div><header><div class="logo-placeholder"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div><h1>JJMex Community <svg class="verified" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></h1><p class="subtitle">Inteligencia vial y redes de movilidad avanzada.</p></header><div class="search-container"><input type="text" id="searchInput" class="search-box" placeholder="Buscar comunidad, ruta o reporte..."> <span class="shortcut-badge">Cmd/Ctrl + K</span></div><div class="container" id="hub-container"></div><div class="modal" id="qrModal" onclick="closeQR()"><div class="qr-window" onclick="event.stopPropagation()"><h2 id="qrName" style="color:#fff;margin-bottom:5px">Acceso</h2><div id="qrcode"></div><button class="close-btn" onclick="closeQR()">Cerrar</button></div></div><div id="toast">Enlace copiado al portapapeles</div><script>const svgs={telegram:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>',whatsapp:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5Z"/></svg>',mindset:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l-2 6H8L6 3Z"/><path d="M10 12h4"/><path d="M12 12v8"/><path d="M9 20h6"/></svg>',qr:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><path d="M3 14h7v7H3z"/></svg>',share:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>'};let cardData=[];async function loadHub(){const t=document.getElementById("hub-container");try{const e=await fetch(`./links.json?v=${Date.now()}`),o=await e.json();cardData=o.comunidades;const n=[...new Set(cardData.map(t=>t.categoria))];t.innerHTML="",n.forEach(e=>{let o=`<div class="category-group" data-category="${e}">`;o+=`<div class="section-label">${e}</div>`,cardData.filter(t=>t.categoria===e).forEach(t=>{const e="telegram"===t.plataforma?"card-tg":"card-wa",n=t.titulo.toLowerCase().includes("mente")?svgs.mindset:svgs[t.plataforma];o+=`\n                            <div class="card ${e}" data-title="${t.titulo.toLowerCase()}" onclick="window.open('${t.url}', '_blank')">\n                                <div class="icon-box">${n}</div>\n                                <div class="content">\n                                    <h3>${t.titulo}</h3>\n                                    <p>${t.descripcion}</p>\n                                </div>\n                                <div class="actions">\n                                    <button class="action-btn" title="Compartir" onclick="event.stopPropagation(); shareLink('${t.url}', '${t.titulo}', '${t.descripcion}')">\n                                        ${svgs.share}\n                                    </button>\n                                    <button class="action-btn" title="Mostrar QR" onclick="event.stopPropagation(); showQR('${t.url}', '${t.titulo}')">\n                                        ${svgs.qr}\n                                    </button>\n                                </div>\n                            </div>\n                        `}),o+="</div>",t.innerHTML+=o}),VanillaTilt.init(document.querySelectorAll(".card"),{max:8,speed:400,glare:!0,"max-glare":.15,perspective:1e3})}catch(e){t.innerHTML='<p style="color:red; text-align:center;">Error al conectar con la base de datos de JJMex.</p>'}}async function shareLink(t,e,o){if(navigator.share)try{await navigator.share({title:e,text:o,url:t})}catch(t){console.log("Usuario canceló el compartir")}else navigator.clipboard.writeText(t),showToast()}function showToast(){const t=document.getElementById("toast");t.classList.add("show"),setTimeout(()=>t.classList.remove("show"),3e3)}function showQR(t,e){const o=document.getElementById("qrModal"),n=document.getElementById("qrcode");document.getElementById("qrName").innerText=e,n.innerHTML="",new QRCode(n,{text:t,width:180,height:180,colorDark:"#000",colorLight:"#fff"}),o.classList.add("active")}function closeQR(){document.getElementById("qrModal").classList.remove("active")}document.getElementById("searchInput").addEventListener("input",t=>{const e=t.target.value.toLowerCase();document.querySelectorAll(".category-group").forEach(t=>{let o=!1;t.querySelectorAll(".card").forEach(t=>{t.getAttribute("data-title").includes(e)?(t.style.display="flex",o=!0):t.style.display="none"}),t.style.display=o?"flex":"none"})}),window.addEventListener("keydown",t=>{(t.ctrlKey||t.metaKey)&&"k"===t.key&&(t.preventDefault(),document.getElementById("searchInput").focus())}),document.addEventListener("DOMContentLoaded",loadHub)</script></body></html>
