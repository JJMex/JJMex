<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#050505"><title>JJMex Community | Hub Oficial</title><meta name="description" content="Red de inteligencia vial, reportes del Metro CDMX y crecimiento personal."><meta property="og:type" content="website"><meta property="og:title" content="JJMex Community | Hub Oficial"><meta property="og:description" content="Únete a la red de reportes viales y movilidad de élite."><meta property="og:image" content="https://raw.githubusercontent.com/JJMex/JJMex/main/Banner.png"><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇲🇽</text></svg>"><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script><style>:root{--bg-dark:#050505;--glass-bg:rgba(20, 20, 20, 0.7);--glass-border:rgba(255, 255, 255, 0.1);--text-main:#ffffff;--text-muted:#9ca3af;--tg-color:#229ED9;--wa-color:#25D366;--accent:#3b82f6}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Outfit,sans-serif;background-color:var(--bg-dark);color:var(--text-main);line-height:1.6;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow-x:hidden}.ambient-light{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;background:radial-gradient(circle at 50% 0,#111 0,#050505 80%)}.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.2;animation:float 20s infinite ease-in-out}.orb-1{width:400px;height:400px;background:var(--tg-color);top:-150px;left:-100px}.orb-2{width:350px;height:350px;background:var(--wa-color);bottom:-50px;right:-50px;animation-delay:-5s}@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,50px)}}header{text-align:center;padding:60px 20px 40px;width:100%;max-width:600px}.banner-wrapper{position:relative;margin-bottom:30px;border-radius:24px;overflow:hidden;box-shadow:0 30px 60px -12px rgba(0,0,0,.5);border:1px solid var(--glass-border)}.banner-img{width:100%;display:block;transition:transform .6s cubic-bezier(.2, .8, .2, 1)}.banner-wrapper:hover .banner-img{transform:scale(1.05)}h1{font-size:2.5rem;letter-spacing:-.03em;display:flex;align-items:center;justify-content:center;gap:10px}.verified-badge{width:24px;height:24px;color:var(--accent)}.subtitle{color:var(--text-muted);margin-top:8px;font-size:1.1rem}.container{width:100%;max-width:550px;padding:0 20px 80px;display:flex;flex-direction:column;gap:16px}.section-label{font-size:.75rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#444;margin-top:30px;display:flex;align-items:center;gap:15px}.section-label::after{content:'';height:1px;flex-grow:1;background:linear-gradient(90deg,#222,transparent)}.card{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:20px;padding:20px;text-decoration:none;color:inherit;display:flex;align-items:center;gap:18px;transition:all .4s cubic-bezier(.4, 0, .2, 1);position:relative;overflow:hidden;backdrop-filter:blur(10px)}.card:hover{transform:translateY(-5px);border-color:rgba(255,255,255,.2);background:rgba(30,30,30,.8)}.icon-box{width:52px;height:52px;background:rgba(255,255,255,.03);border-radius:16px;display:flex;align-items:center;justify-content:center;border:1px solid var(--glass-border)}.card h3{font-size:1.1rem;margin-bottom:2px}.card p{font-size:.9rem;color:var(--text-muted);line-height:1.4}.qr-trigger{background:0 0;border:none;color:#444;cursor:pointer;padding:10px;transition:all .2s;z-index:5;margin-left:auto}.qr-trigger:hover{color:#fff;transform:scale(1.2)}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(15px);display:grid;place-items:center;opacity:0;pointer-events:none;transition:.3s;z-index:1000}.modal-overlay.active{opacity:1;pointer-events:all}.qr-card{background:#111;padding:40px;border-radius:30px;text-align:center;border:1px solid #222}#qrcode-display{background:#fff;padding:15px;border-radius:15px;margin:20px 0}.close-btn{background:#fff;color:#000;border:none;padding:12px 30px;border-radius:50px;font-weight:600;cursor:pointer}footer{padding:40px;color:#333;font-size:.8rem;text-align:center}</style></head><body><div class="ambient-light"><div class="orb orb-1"></div><div class="orb orb-2"></div></div><header><div class="banner-wrapper"><img src="https://raw.githubusercontent.com/JJMex/JJMex/main/Banner.png" alt="Banner" class="banner-img"></div><h1>JJMex Community <svg class="verified-badge" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></h1><p class="subtitle">Ecosistema de inteligencia vial y movilidad.</p></header><div class="container" id="links-container"></div><footer>© 2026 JJMex Systems. Desplegado vía GitHub CI/CD.</footer><div class="modal-overlay" id="qrModal"><div class="qr-card"><h3 id="qrTitle">Acceso Directo</h3><div id="qrcode-display"></div><button class="close-btn" onclick="closeQR()">Cerrar</button></div></div><script>const icons={telegram:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>',whatsapp:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5Z"/></svg>'};async function initHub(){const t=document.getElementById("links-container");try{const e=await fetch("./links.json"),{comunidades:n}=await e.json(),i=[...new Set(n.map(t=>t.categoria))];t.innerHTML="",i.forEach(e=>{t.innerHTML+=`<div class="section-label">${e}</div>`,n.filter(t=>t.categoria===e).forEach(e=>{t.innerHTML+=createCard(e)})})}catch(e){t.innerHTML="<p>Error al sincronizar datos.</p>"}}function createCard(t){const e=icons[t.plataforma]||icons.telegram;return`\n                <div class="card link-card" onclick="window.open('${t.url}', '_blank')">\n                    <div class="icon-box">${e}</div>\n                    <div class="content">\n                        <h3>${t.titulo}</h3>\n                        <p>${t.descripcion}</p>\n                    </div>\n                    <button class="qr-trigger" onclick="event.stopPropagation(); openQR('${t.url}', '${t.titulo}')">\n                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><path d="M3 14h7v7H3z"></path></svg>\n                    </button>\n                </div>\n            `}function openQR(t,e){const n=document.getElementById("qrModal"),i=document.getElementById("qrcode-display");document.getElementById("qrTitle").innerText=e,i.innerHTML="",new QRCode(i,{text:t,width:200,height:200}),n.classList.add("active")}function closeQR(){document.getElementById("qrModal").classList.remove("active")}document.addEventListener("DOMContentLoaded",initHub)</script></body></html>
