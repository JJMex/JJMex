<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    
    <title>JJMex Community | Hub Oficial</title>
    <meta name="description" content="Red de inteligencia vial, reportes del Metro CDMX y crecimiento personal.">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="JJMex Community | Hub Oficial">
    <meta property="og:description" content="Únete a la red de reportes viales y movilidad de élite.">
    <meta property="og:image" content="https://raw.githubusercontent.com/JJMex/JJMex/main/Banner.png">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇲🇽</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --bg-dark: #050505;
            --glass-bg: rgba(20, 20, 20, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --tg-color: #229ED9;
            --wa-color: #25D366;
            --accent: #3b82f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- EFECTOS AMBIENTALES --- */
        .ambient-light {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: radial-gradient(circle at 50% 0%, #111111 0%, #050505 80%);
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.15;
            animation: float 20s infinite ease-in-out;
        }
        .orb-1 { width: 400px; height: 400px; background: var(--tg-color); top: -150px; left: -100px; }
        .orb-2 { width: 350px; height: 350px; background: var(--wa-color); bottom: -50px; right: -50px; animation-delay: -5s; }
        
        @keyframes float { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(30px, 50px); } }

        /* --- HEADER --- */
        header { text-align: center; padding: 60px 20px 40px; width: 100%; max-width: 600px; }
        .banner-wrapper {
            position: relative; margin-bottom: 30px; border-radius: 24px; overflow: hidden;
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.5); border: 1px solid var(--glass-border);
        }
        .banner-img { width: 100%; display: block; transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .banner-wrapper:hover .banner-img { transform: scale(1.05); }

        h1 { font-size: 2.5rem; letter-spacing: -0.03em; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .verified-badge { width: 24px; height: 24px; color: var(--accent); }
        .subtitle { color: var(--text-muted); margin-top: 8px; font-size: 1.1rem; }

        /* --- CONTENEDOR DE TARJETAS --- */
        .container { width: 100%; max-width: 550px; padding: 0 20px 80px; display: flex; flex-direction: column; gap: 16px; }

        .section-label {
            font-size: 0.75rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
            color: #555; margin-top: 30px; display: flex; align-items: center; gap: 15px;
        }
        .section-label::after { content: ''; height: 1px; flex-grow: 1; background: linear-gradient(90deg, #333, transparent); }

        .card {
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 20px; text-decoration: none; color: inherit; display: flex; align-items: center; gap: 18px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden;
            backdrop-filter: blur(10px); cursor: pointer;
        }
        .card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); background: rgba(30,30,30,0.8); }

        .icon-box {
            width: 52px; height: 52px; background: rgba(255,255,255,0.03); border-radius: 16px;
            display: flex; align-items: center; justify-content: center; border: 1px solid var(--glass-border);
            flex-shrink: 0;
        }
        .icon-box svg { width: 24px; height: 24px; }
        
        .content { flex-grow: 1; }
        .card h3 { font-size: 1.1rem; margin-bottom: 2px; color: #fff; }
        .card p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.4; }

        .qr-trigger {
            background: transparent; border: none; color: #444; cursor: pointer; padding: 10px;
            transition: all 0.2s; z-index: 5; margin-left: auto;
        }
        .qr-trigger:hover { color: #fff; transform: scale(1.2); }

        /* --- MODAL QR --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            display: grid; place-items: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .qr-card {
            background: #111; padding: 40px; border-radius: 30px; text-align: center; border: 1px solid #222;
            max-width: 90%;
        }
        #qrcode-display { background: #fff; padding: 15px; border-radius: 15px; margin: 20px auto; width: fit-content; }
        .close-btn { background: #fff; color: #000; border: none; padding: 12px 30px; border-radius: 50px; font-weight: 600; cursor: pointer; margin-top: 10px; }

        footer { padding: 40px; color: #444; font-size: 0.8rem; text-align: center; margin-top: auto; }
    </style>
</head>
<body>

    <div class="ambient-light"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

    <header>
        <div class="banner-wrapper">
            <img src="https://raw.githubusercontent.com/JJMex/JJMex/main/Banner.png" alt="JJMex Banner" class="banner-img">
        </div>
        <h1>JJMex Community <svg class="verified-badge" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></h1>
        <p class="subtitle">Hub oficial de inteligencia vial y movilidad.</p>
    </header>

    <div class="container" id="links-container">
        </div>

    <footer>© 2026 JJMex Systems. Desplegado vía GitHub CI/CD.</footer>

    <div class="modal-overlay" id="qrModal">
        <div class="qr-card">
            <h3 id="qrTitle" style="color: white; margin-bottom: 5px;">Escanear para Unirse</h3>
            <p id="qrTargetName" style="color: #888; font-size: 0.9rem;">Grupo Oficial</p>
            <div id="qrcode-display"></div>
            <button class="close-btn" onclick="closeQR()">Cerrar</button>
        </div>
    </div>

    <script>
        // Diccionario de Iconos SVGs Originales
        const icons = {
            telegram: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/><path d="M2 8h20"/></svg>`,
            whatsapp: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>`,
            default: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`
        };

        async function initHub() {
            const container = document.getElementById('links-container');
            try {
                // Cargamos la data desde el archivo externo
                const res = await fetch('./links.json');
                if (!res.ok) throw new Error('No se pudo cargar links.json');
                const data = await res.json();
                
                // Extraemos categorías únicas para organizar la UI
                const categorias = [...new Set(data.comunidades.map(c => c.categoria))];
                
                container.innerHTML = '';
                categorias.forEach(cat => {
                    container.innerHTML += `<div class="section-label">${cat}</div>`;
                    data.comunidades.filter(c => c.categoria === cat).forEach(link => {
                        container.innerHTML += createCardHTML(link);
                    });
                });
            } catch (e) {
                console.error(e);
                container.innerHTML = `<p style="text-align:center; color:red; margin-top:20px;">Error: Asegúrate de que 'links.json' exista en el repositorio.</p>`;
            }
        }

        function createCardHTML(link) {
            // Asignamos icono según plataforma o usamos el de mindset para 'Mente & Exito'
            let iconKey = link.plataforma;
            if (link.titulo.includes('Mente')) iconKey = 'default';
            const icon = icons[iconKey] || icons.telegram;

            return `
                <div class="card" onclick="window.open('${link.url}', '_blank')">
                    <div class="icon-box">${icon}</div>
                    <div class="content">
                        <h3>${link.titulo}</h3>
                        <p>${link.descripcion}</p>
                    </div>
                    <button class="qr-trigger" onclick="event.stopPropagation(); openQR('${link.url}', '${link.titulo}')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><path d="M3 14h7v7H3z"></path></svg>
                    </button>
                </div>
            `;
        }

        function openQR(url, title) {
            const modal = document.getElementById('qrModal');
            const display = document.getElementById('qrcode-display');
            document.getElementById('qrTargetName').innerText = title;
            display.innerHTML = '';
            new QRCode(display, { text: url, width: 200, height: 200, colorDark: "#000000", colorLight: "#ffffff" });
            modal.classList.add('active');
        }

        function closeQR() { document.getElementById('qrModal').classList.remove('active'); }

        // Cerrar modal si se hace clic fuera de la tarjeta
        window.onclick = (e) => { if (e.target.id === 'qrModal') closeQR(); };

        document.addEventListener('DOMContentLoaded', initHub);
    </script>
</body>
</html>
